<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AI Meeting Assistant</title>

    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>

    <style>
        :root {

            --bg-main: #f8fafc;
            --surface: #ffffff;

            --text-main: #0f172a;
            --text-muted: #475569;

            --primary: #4f46e5;
            --primary-hover: #4338ca;

            --border: #e2e8f0;

            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 8px 24px rgba(15, 23, 42, 0.06);

            --radius: 16px;
        }

        * {
            box-sizing: border-box;
        }

        body {

            margin: 0;

            font-family:
                Inter,
                system-ui,
                -apple-system,
                BlinkMacSystemFont,
                "Segoe UI",
                sans-serif;

            background: var(--bg-main);

            color: var(--text-main);

            padding: 40px 20px;

            line-height: 1.7;
        }

        .container {

            max-width: 900px;
            margin: auto;
        }

        /* ----------------------------------- */
        /* Header */
        /* ----------------------------------- */

        header {

            display: flex;

            justify-content: space-between;

            align-items: center;

            margin-bottom: 36px;

            padding-bottom: 20px;

            border-bottom: 1px solid var(--border);
        }

        .brand {

            display: flex;

            align-items: center;

            gap: 14px;
        }

        .brand svg {

            color: var(--primary);

            flex-shrink: 0;
        }

        .brand h1 {

            margin: 0;

            font-size: 28px;

            font-weight: 800;

            letter-spacing: -0.03em;
        }

        /* ----------------------------------- */
        /* Buttons */
        /* ----------------------------------- */

        .btn-secondary {

            display: inline-flex;

            align-items: center;

            gap: 8px;

            text-decoration: none;

            background: var(--surface);

            border: 1px solid var(--border);

            color: var(--text-muted);

            padding: 10px 16px;

            border-radius: 10px;

            font-size: 14px;

            font-weight: 600;

            transition: all 0.2s ease;

            box-shadow: var(--shadow-sm);
        }

        .btn-secondary:hover {

            background: #f1f5f9;

            color: var(--text-main);
        }

        .btn-primary {

            width: 100%;

            border: none;

            background: var(--primary);

            color: white;

            padding: 14px 18px;

            border-radius: 12px;

            font-size: 15px;

            font-weight: 700;

            cursor: pointer;

            transition:
                transform 0.2s ease,
                background 0.2s ease,
                box-shadow 0.2s ease;

            box-shadow:
                0 6px 18px rgba(79, 70, 229, 0.25);
        }

        .btn-primary:hover {

            background: var(--primary-hover);

            transform: translateY(-1px);
        }

        form.htmx-request .btn-primary {

            opacity: 0.6;

            pointer-events: none;

            transform: none;
        }

        /* ----------------------------------- */
        /* Upload Card */
        /* ----------------------------------- */

        .card {

            background: var(--surface);

            border: 1px solid var(--border);

            border-radius: var(--radius);

            padding: 32px;

            box-shadow: var(--shadow-md);
        }

        .file-group {

            margin-bottom: 22px;
        }

        .file-label {

            display: block;

            font-size: 14px;

            font-weight: 600;

            margin-bottom: 10px;

            color: var(--text-muted);
        }

        input[type="file"] {

            width: 100%;

            border: 1px dashed #cbd5e1;

            background: #f8fafc;

            border-radius: 12px;

            padding: 14px;

            cursor: pointer;

            transition: all 0.2s ease;

            color: var(--text-muted);
        }

        input[type="file"]:hover {

            background: #eef2ff;

            border-color: var(--primary);
        }

        form.htmx-request input[type="file"] {

            opacity: 0.5;

            pointer-events: none;
        }

        /* ----------------------------------- */
        /* Loading State */
        /* ----------------------------------- */

        #loading {

            display: none;
        }

        form.htmx-request+#loading {

            display: block;
        }

        .loading-box {

            margin-top: 28px;

            background: #fafafa;

            border: 1px solid var(--border);

            border-radius: 14px;

            padding: 24px;

            overflow: hidden;

            position: relative;
        }

        .loading-box::before {

            content: "";

            position: absolute;

            inset: 0;

            background:
                linear-gradient(90deg,
                    transparent,
                    rgba(79, 70, 229, 0.08),
                    transparent);

            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {

            0% {
                transform: translateX(-100%);
            }

            100% {
                transform: translateX(100%);
            }
        }

        .loading-line {

            position: relative;

            z-index: 1;

            opacity: 0;

            transform: translateY(5px);

            animation: fadeIn 0.5s forwards;

            font-size: 14px;

            color: var(--text-muted);

            margin: 12px 0;
        }

        .loading-line:nth-child(1) {
            animation-delay: 0.2s;
        }

        .loading-line:nth-child(2) {
            animation-delay: 1s;
        }

        .loading-line:nth-child(3) {
            animation-delay: 2s;
        }

        .loading-line:nth-child(4) {
            animation-delay: 3s;
        }

        @keyframes fadeIn {

            from {

                opacity: 0;

                transform: translateY(5px);
            }

            to {

                opacity: 1;

                transform: translateY(0);
            }
        }

        /* ----------------------------------- */
        /* Result Section */
        /* ----------------------------------- */

        #result {

            margin-top: 30px;
        }

        .result-box {

            background: var(--surface);

            border: 1px solid var(--border);

            border-radius: var(--radius);

            padding: 30px;

            box-shadow: var(--shadow-md);

            transition: all 0.2s ease;
        }

        /* ----------------------------------- */
        /* Summary Styling */
        /* ----------------------------------- */

        .summary-box {

            background: #fcfcff;

            border: 1px solid #e8e8ff;

            padding: 24px;

            border-radius: 14px;

            margin-top: 20px;

            line-height: 1.85;
        }

        .summary-box h1,
        .summary-box h2,
        .summary-box h3 {

            margin-top: 24px;

            margin-bottom: 10px;

            font-weight: 700;
        }

        .summary-box ul {

            padding-left: 24px;
        }

        pre {

            white-space: pre-wrap;
        }

        /* ----------------------------------- */
        /* Responsive */
        /* ----------------------------------- */

        @media (max-width: 640px) {

            header {

                flex-direction: column;

                align-items: flex-start;

                gap: 16px;
            }

            .card {

                padding: 24px;
            }

            .brand h1 {

                font-size: 24px;
            }
        }
    </style>

</head>

<body>

    <div class="container">

        <!-- Header -->

        <header>

            <div class="brand">

                <svg width="34" height="34" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">

                    <path
                        d="M12 2C6.47715 2 2 6.47715 2 12C2 17.5228 6.47715 22 12 22C17.5228 22 22 17.5228 22 12C22 6.47715 17.5228 2 12 2"
                        stroke="currentColor" stroke-width="2.5" stroke-linecap="round" />

                    <path d="M8 12L11 15L16 9" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
                        stroke-linejoin="round" />

                </svg>

                <h1>AI Meeting Assistant</h1>

            </div>

            <a href="/history" class="btn-secondary">

                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">

                    <circle cx="12" cy="12" r="10"></circle>

                    <polyline points="12 6 12 12 16 14"></polyline>

                </svg>

                View History

            </a>

        </header>

        <!-- Upload Card -->

        <div class="card">

            <form hx-post="/upload-ui" hx-target="#result" hx-indicator="#loading" hx-encoding="multipart/form-data">

                <div class="file-group">

                    <label class="file-label">
                        Upload Audio Recording
                    </label>

                    <input type="file" name="audio" required>

                </div>

                <button type="submit" class="btn-primary">

                    Upload & Process Transcript

                </button>

            </form>

            <!-- Loading State -->

            <div id="loading">

                <div class="loading-box">

                    <div class="loading-line">
                        ⚡ Processing meeting...
                    </div>

                    <div class="loading-line">
                        🎙️ Transcribing audio using Whisper...
                    </div>

                    <div class="loading-line">
                        🧠 Generating AI summary using Phi3...
                    </div>

                    <div class="loading-line">
                        ⏳ Finalizing structured report...
                    </div>

                </div>

            </div>

        </div>

        <!-- Dynamic Result Area -->

        <div id="result" class="result-box">

            Processed transcript and AI-generated summaries
            will appear here.

        </div>

    </div>

</body>

</html>
